<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>     

    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- font google  -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awsome  -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />



    <!-- daisyui + tailwind -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- link css  -->
     <link rel="stylesheet" href="tailwind.init.css">
</head>
<body class="">
    
    <main class=" w-5/12 bg-base-300 mx-auto my-auto justify-center text-center shadow-2xl flex mt-20 flex-col items-center">
<section class="p-10">
    <div class="img"> 
<img src="assets/github-logo.png" class=" mx-auto">
<h1 class=" font-semibold text-2xl">GitHub Issues Tracker</h1>
<p class=" text-[12px]">Sign in to manage your issues</p>
</div>
<div class="login">

      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label">Username</label>
          <input type="email" class="input w-80" id="username" placeholder="Enter username" />
          <label class="label text-[#4A00FF]">Default: admin</label>
          <label class="label">Password</label>
          <input type="password" class="input" id="password" placeholder="Password" />
            <label class="label text-[#4A00FF]">Default: admin123</label>
          <button class="btn btn-neutral mt-4" id="singIn-btn">Sign In</button>
        </fieldset>
      </div>


        </div>




</div>

    <div class="or">
        <h2>OR</h2>
    </div>
<div class="or-footer">
<span class=" text-[12px]">Demo Credentials:</span>
<br><br>

<p>Username: admin</p>
<p>Password: admin123</p>
</div>
</section>
    </main>



<script src="login.js"></script>
<script src="index.js"></script>
</body>
</html>
